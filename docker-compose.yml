services:
  postgres:
    image: postgres:16-alpine
    container_name: rl-postgres
    environment:
      POSTGRES_USER: rl_user
      POSTGRES_PASSWORD: rl_pass
      POSTGRES_DB: rl_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rl_user -d rl_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rl-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: rl-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://rl_user:rl_pass@postgres:5432/rl_platform
      REDIS_URL: redis://redis:6379/0
      EXPORT_DIR: /exports
    volumes:
      - exports:/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
    container_name: rl-worker
    command: python -m workers.quality_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://rl_user:rl_pass@postgres:5432/rl_platform
      REDIS_URL: redis://redis:6379/0
      EXPORT_DIR: /exports
    volumes:
      - exports:/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  exports:
